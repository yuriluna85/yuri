name: Rotina de Clipping Automático

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar Crawler
        env:
          # É aqui que a mágica acontece: o script lê a chave do segredo
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: python buscar_mencoes.py

      - name: Salvar alterações
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add .
          git diff --staged --quiet || git commit -m "🤖 [Auto] Clipping atualizado via API"
          git push
