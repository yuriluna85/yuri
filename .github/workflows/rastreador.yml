name: Rotina de Clipping Automático

on:
  schedule:
    - cron: '0 9 * * *' # Roda todos os dias às 06:00 (Brasília)
  workflow_dispatch: # Permite que você rode manualmente pelo botão "Run workflow"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          # Garante que vai ler o arquivo de requisitos que criamos
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install googlesearch-python==1.2.3; fi

      - name: Executar Crawler
        run: python buscar_mencoes.py

      - name: Salvar e Commitar Alterações
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          # O comando 'git add .' é vital aqui: ele adiciona a pasta /data e o index.html de uma vez
          git add .
          # Só faz o commit se houver mudanças reais (evita erro se nada for encontrado)
          git diff --staged --quiet || git commit -m "🤖 [Auto] Atualização do Memorial (Pasta Data + HTML)"
          git push
